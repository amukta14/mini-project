{% extends "base.html" %}
{% block title %}Login | ProjectIQ{% endblock %}
{% block content %}
<main class="landing-root auth-root">
  <div class="landing-bg" aria-hidden="true"></div>
  <div class="landing-shell auth-shell">
    <nav class="landing-nav auth-nav">
      <div class="brand-mark">
        <span class="brand-dot"></span>
        <span class="brand-text">ProjectIQ</span>
      </div>
      <a class="btn ghost" href="{{ url_for('auth.signup') }}">Create account</a>
    </nav>

    <section class="auth-card">
      <div class="auth-head">
        <h1>Welcome back</h1>
        <p>Log in to continue to your project idea dashboard.</p>
      </div>
      <form method="post" action="{{ url_for('auth.login_post') }}">
        <label>Email</label>
        <input name="email" type="email" required />
        <label>Password</label>
        <input name="password" type="password" required />
        <button class="btn primary" type="submit">Login</button>
      </form>
      <p class="auth-foot">
        New user?
        <a href="{{ url_for('auth.signup') }}">Create an account</a>
      </p>
    </section>
  </div>
</main>
{% endblock %}
